

services:

  web:
    build: ../app
    environment:
      DB_HOST: db
      REDIS_HOST: cache
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    networks:
      - node-app-networks
    labels:
      - service=web
    deploy:
      replicas: 5

  db:
    image: postgres:latest
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: appdb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - node-app-networks
    volumes:
      - postgres-data:/var/lib/postgresql/18/docker
    labels:
      - service=database


  cache:
    image: redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - node-app-networks
    volumes:
      - redis-data:/data
    labels:
      - service=cache

  
networks:
  node-app-networks:
    driver: bridge

volumes:
  postgres-data:
  redis-data:



    