apiVersion: v1
kind: Pod
metadata:
  name: secret-env-pod
spec:
  containers:
    - name: busybox
      image: busybox
      command: ["/bin/sh", "-c", "env && sleep 3600"]

      env:
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: DB_USER

      volumeMounts:
        - name: secret-volume
          mountPath: /etc/db-credentials
          readOnly: true

  volumes:
    - name: secret-volume
      secret:
        secretName: db-credentials