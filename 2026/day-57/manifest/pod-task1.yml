
apiVersion: v1
kind: Pod
metadata:
  name: nginx-pod 
spec: 
  containers:
  - name: nginx-container
    image: nginx:latest
    ports:  
    - containerPort: 80
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu:  "250m"
        memory:  "256Mi"
  