

apiVersion: v1
kind: Pod
metadata:
  name: readiness-pod 
  labels:               
    app: nginx
spec: 
  containers:
  - name: nginx-container
    image: nginx:latest
    ports:  
    - containerPort: 80
    readinessProbe:
      httpGet:
        path: /
        port: 80
      periodSeconds: 5
      initialDelaySeconds: 10
      failureThreshold: 3


      