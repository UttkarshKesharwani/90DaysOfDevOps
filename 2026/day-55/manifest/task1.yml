apiVersion: v1
kind: Pod
metadata:
  name: emptydir-pod
spec:
  containers:
    - name: busybox
      image: busybox:latest
      command: ["/bin/sh", "-c"]
      args:
        - |
          date > /data/message.txt;
          sleep 3600
      volumeMounts:
        - name: data-volume
          mountPath: /data
      
  volumes:
  - name: data-volume
    emptyDir: {}
